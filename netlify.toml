# Netlify Configuration — ASR Services
[build]
  publish = "."
  ignore = "exit 1"

# Redirect all unknown paths to index.html (SPA-like)
[[redirects]]
  from = "/agents"
  to = "/agents.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Access-Control-Allow-Origin = "*"
