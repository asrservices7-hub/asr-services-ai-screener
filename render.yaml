services:
  - type: web
    name: asr-services-backend
    env: docker
    dockerFilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://asrservices24.netlify.app
